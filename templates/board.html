<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>피드</title>
    <style>
        body { background-color: #fafafa; font-family: sans-serif; margin: 0; padding-top: 60px; }
        .nav { background: white; border-bottom: 1px solid #dbdbdb; position: fixed; top: 0; width: 100%; height: 50px; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .container { max-width: 500px; margin: 0 auto; padding: 10px; }
        .write-box, .post { background: white; border: 1px solid #dbdbdb; padding: 15px; margin-bottom: 15px; border-radius: 3px; }
        .post-header { font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .post-time { color: #999; font-size: 0.8em; font-weight: normal; margin-left: 8px; }
        .del-btn { color: #ed4956; text-decoration: none; font-size: 0.8em; }
        textarea { width: 100%; border: 1px solid #dbdbdb; padding: 10px; box-sizing: border-box; border-radius: 3px; resize: none; }
        .btn { background: #0095f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; float: right; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">
        <strong>Our Azit</strong>
        <span>{{ user }}님</span>
        <a href="/logout" style="text-decoration:none; color:gray; font-size:0.8em;">로그아웃</a>
    </div>
    
    <div class="container">
        <div class="write-box">
            <form action="/write" method="POST">
                <textarea name="content" rows="3" placeholder="소식을 전해보세요!" required></textarea>
                <button type="submit" class="btn">공유하기</button>
                <div style="clear:both;"></div>
            </form>
        </div>

        {% for p in all_posts %}
        <div class="post">
            <div class="post-header">
                <div>
                    <span>👤 {{ p.user }}</span>
                    <span class="post-time">{{ p.created_at }}</span>
                </div>
                {% if p.user == user %}
                <a href="/delete/{{ p.id }}" class="del-btn" onclick="return confirm('삭제할까요?')">삭제</a>
                {% endif %}
            </div>
            <div class="post-content">{{ p.content }}</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
