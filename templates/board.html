<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>피드 - Our Azit</title>
    <style>
        body { background-color: #fafafa; font-family: sans-serif; margin: 0; padding-top: 70px; }
        .nav { background: white; border-bottom: 1px solid #dbdbdb; position: fixed; top: 0; width: 100%; height: 50px; display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: bold; font-size: 1.2em; }
        .container { max-width: 500px; margin: 0 auto; padding: 10px; }
        .write-box { background: white; border: 1px solid #dbdbdb; padding: 20px; margin-bottom: 20px; border-radius: 3px; }
        textarea { width: 100%; border: 1px solid #dbdbdb; padding: 10px; resize: none; box-sizing: border-box; border-radius: 3px; }
        .post { background: white; border: 1px solid #dbdbdb; margin-bottom: 20px; border-radius: 3px; overflow: hidden; }
        .post-header { padding: 14px; font-weight: bold; border-bottom: 1px solid #efefef; display: flex; align-items: center; }
        .post-content { padding: 16px; color: #262626; line-height: 1.5; font-size: 14px; }
        .btn-post { background: #0095f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; float: right; margin-top: 10px; }
        .btn-post:hover { background: #1877f2; }
    </style>
</head>
<body>
    <div class="nav">Our Azit Feed</div>
    
    <div class="container">
        <div class="write-box">
            <p style="margin-top:0;"><strong>{{ user }}</strong>님, 소식을 공유해보세요!</p>
            <form action="/write" method="POST">
                <input type="hidden" name="user" value="{{ user }}">
                <textarea name="content" rows="3" placeholder="어떤 생각을 하고 계신가요?" required></textarea>
                <button type="submit" class="btn-post">공유하기</button>
                <div style="clear:both;"></div>
            </form>
        </div>

        {% for p in all_posts %}
        <div class="post">
            <div class="post-header">
                <div style="width:30px; height:30px; background:#ddd; border-radius:50%; margin-right:10px;"></div>
                {{ p['user'] }}
            </div>
            <div class="post-content">{{ p['content'] }}</div>
        </div>
        {% endfor %}
        
        {% if not all_posts %}
        <p style="text-align:center; color:#999;">아직 올라온 글이 없어요.</p>
        {% endif %}
    </div>
</body>
</html>
